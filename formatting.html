<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formating tags</title>
  </head>
  <body>
    <!-- bold tag -->
    <b>Hello world</b>
    <br />
    <!-- italic tag -->
    <i>Hello world</i>
    <br />
    <!-- strong tag -->
    <strong>Hello world</strong>
    <br />
    <!-- mark tag -->
    <mark>Hello world</mark>
    <br />
    <!-- emphasis tag -->
    <em>Hello world</em>
    <br />
    <!-- strike tag -->
    <s>Hello world</s>
    <br />
    <!-- Horizontal line -->
    <hr />
    <!-- subscript -->
    <h1>H<sub>2</sub>O</h1>
    <!-- superscript -->
    <h1>x<sup>2</sup></h1>
    <!-- cite tag -->
    <h1>Hello <cite>world</cite></h1>
    <!-- abbreviation tag -->
    <abbr title="World wide web">WWW</abbr>
    <!-- delete tag -->
    <h1>Hello <del>world</del></h1>
    <!-- preformatted tag -->
    <pre>Hello world</pre>
    <!-- address tag -->
    <address>
      Written by <a href="mailto:webmaster@example.com">Jon Doe</a>.<br />
      Visit us at:<br />
      Example.com<br />
      Box 564, Disneyland<br />
      USA
    </address>
    <br />
    <!-- blockquote tag -->
    <q>Hello world</q>
    <br />
    <h1>hello<span>world</span></h1>
  </body>
</html>
