<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- bold tag -->
    <b>Hello world</b>
    <br />
    <!-- italic tag -->
    <i>Hello world</i>
    <br />
    <!-- strong tag -->
    <strong>Hello world</strong>
    <br />
    <!-- mark tag -->
    <mark>Hello world</mark>
    <br />
    <!-- emphasis tag -->
    <em>Hello world</em>
    <br />
    <!-- strike tag -->
    <s>Hello world</s>
    <br />
  </body>
</html>
