<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lists</title>
  </head>
  <body>
    <h1>ordered list</h1>
    <ol>
      <li>WT</li>
      <li>CD</li>
    </ol>
    <ol type="A">
      <li>OOAD</li>
      <li>NS</li>
    </ol>
    <h1>unordered list</h1>
    <ul>
      <li>WT</li>
      <li>CD</li>
    </ul>
    <ul type="square">
      <li>OOAD</li>
      <li>NS</li>
    </ul>
    <h1>Definition list</h1>
    <dl>
      <dt>WT</dt>
      <dd>WT stands for web Technology</dd>
    </dl>
    <dl>
      <dt>CD</dt>
      <dd>CD stands for complier Desigign</dd>
    </dl>
  </body>
</html>
